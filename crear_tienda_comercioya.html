<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear tu tienda</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0f1117;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
background:#1a1d27;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:25px;
text-align:center;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:8px;
border:none;
font-size:16px;
background:#e9efb0;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#6c63ff,#9c7bff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="card">
<h1>Crear tu tienda</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<input id="nombreTienda" placeholder="Nombre de tu tienda">

<button onclick="crear()">Crear tienda</button>
</div>

<script>

const supabase = window.supabase.createClient(
"https://tqqemmwxulvlwfyjlyya.supabase.co",
"sb_publishable_GGQSguoAFktzQdH2zzAjrQ_GyGLp44P"
);

async function crear(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value
const nombre=document.getElementById("nombreTienda").value

const {data,error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

await supabase.rpc("crear_tienda",{nombre_tienda:nombre})

alert("Tienda creada correctamente")

}

</script>

</body>
</html>
