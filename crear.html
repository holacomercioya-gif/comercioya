<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear tu tienda | ComercioYa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: Arial;
background:#0d0d0f;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:#1c1c1f;
padding:40px;
border-radius:16px;
width:90%;
max-width:420px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#2a2a2e;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#7c5cfc;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="card">

<h1>Crear tu tienda</h1>

<input id="email" placeholder="Email administrador">
<input id="pass" type="password" placeholder="Contraseña">
<input id="tienda" placeholder="Nombre de tu tienda">

<button onclick="crear()">Crear tienda</button>

<div class="result" id="resultado"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://ggqsguoafktzqdh2zzajrq.supabase.co",
"sb_publishable_GGQSguoAFktzQdH2zzAjrQ_GyGLp44P"
)

async function crear(){

let email=document.getElementById("email").value
let pass=document.getElementById("pass").value
let nombre=document.getElementById("tienda").value.toLowerCase().replace(/ /g,"-")

if(!email || !pass || !nombre){
alert("Completá todos los campos")
return
}

let { data, error } = await supabase.auth.signUp({
email:email,
password:pass
})

if(error){
alert(error.message)
return
}

let url="https://comercioya.com.ar/?tienda="+nombre

document.getElementById("resultado").innerHTML=
"Tu tienda está lista:<br><br><a href='"+url+"' target='_blank'>"+url+"</a>"

}

</script>

</body>
</html>
