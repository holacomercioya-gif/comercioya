<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear tu tienda | ComercioYa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ box-sizing: border-box; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:linear-gradient(135deg,#0f172a,#020617);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:100%;
max-width:420px;
padding:30px;
}

.card{
background:#111827;
padding:40px 30px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

h1{
margin:0 0 25px 0;
font-size:30px;
text-align:center;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#f1f5f9;
color:#111;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

button:hover:not(:disabled){
transform:translateY(-1px);
opacity:0.95;
}

.logo{
text-align:center;
font-weight:700;
font-size:22px;
margin-bottom:10px;
color:#a78bfa;
}

.msg{
margin-top:14px;
text-align:center;
font-size:14px;
color:#f87171;
min-height:20px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="logo">ComercioYa</div>
    <h1>Crear tu tienda</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <input id="nombreTienda" placeholder="Nombre de tu tienda">

    <button id="btn" onclick="crear()">Crear tienda</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
if (typeof window.supabase === 'undefined') {
  document.getElementById('msg').textContent = 'Error: no se pudo cargar Supabase';
  document.getElementById('btn').disabled = true;
}

const supabaseClient = window.supabase.createClient(
  "https://tqqemmwxulvlwfyjlyya.supabase.co",
  "sb_publishable_GGQSguoAFktzQdH2zzAjrQ_GyGLp44P"
);

function mostrarMsg(texto, color) {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.style.color = color || '#f87171';
}

async function crear() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const nombre   = document.getElementById("nombreTienda").value.trim();
  const btn      = document.getElementById("btn");

  if (!email || !password || !nombre) {
    mostrarMsg("Completá todos los campos");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Creando...";
  mostrarMsg("");

  try {
    // 1. Registrar usuario
    const { error: signUpError } = await supabaseClient.auth.signUp({ email, password });
    if (signUpError && signUpError.message !== 'User already registered') {
      mostrarMsg("Error al registrar: " + signUpError.message);
      btn.disabled = false;
      btn.textContent = "Crear tienda";
      return;
    }

    // 2. Login
    const { error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (loginError) {
      mostrarMsg("Error al iniciar sesión: " + loginError.message);
      btn.disabled = false;
      btn.textContent = "Crear tienda";
      return;
    }

    // 3. Verificar sesión
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      mostrarMsg("No hay sesión activa.");
      btn.disabled = false;
      btn.textContent = "Crear tienda";
      return;
    }

    // 4. Crear tienda via RPC
    const { error: rpcError } = await supabaseClient.rpc("crear_tienda", { nombre_tienda: nombre });
    if (rpcError) {
      mostrarMsg("Error al crear tienda: " + rpcError.message);
      btn.disabled = false;
      btn.textContent = "Crear tienda";
      return;
    }

    // 5. Insertar también en tabla stores para que funcione con index.html
    const slug = nombre.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9-]/g, '');

    await supabaseClient.from('stores').upsert({
      id: slug,
      store_name: nombre,
      whatsapp: '',
      status: 'always'
    }, { onConflict: 'id', ignoreDuplicates: true });

    // 6. Redirigir a la tienda
    mostrarMsg("¡Tienda creada correctamente! Redirigiendo...", "#4ade80");
    setTimeout(() => {
      window.location.href = "/?tienda=" + slug;
    }, 1500);

  } catch(e) {
    mostrarMsg("Error inesperado: " + e.message);
    btn.disabled = false;
    btn.textContent = "Crear tienda";
  }
}
</script>

</body>
</html>
